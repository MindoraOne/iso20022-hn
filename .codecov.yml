codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
  hide_project_coverage: no
  hide_branch_coverage: no

ignore:
  - "tests"
  - "setup.py"

flags:
  unittests:
    paths:
      - pain001
    carryforward: yes

github:
  checks:
    annotations: yes
