name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC

jobs:
  mutation_fast:
    runs-on: ubuntu-latest
    name: Mutation Testing (Fast)
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make mutate-fast || true  # Continue on failure, upload results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-fast-results
          path: |
            .mutmut-cache/
            .coverage
            htmlcov/

  mutation_full:
    runs-on: ubuntu-latest
    name: Mutation Testing (Full)
    timeout-minutes: 30
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make mutate || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-full-results
          path: |
            .mutmut-cache/
            .coverage
            htmlcov/
        with:
          name: complexity-report
          path: |
            .radon-rc
            htmlcov/

  benchmarks:
    runs-on: ubuntu-latest
    name: Performance Benchmarks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make perf
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: |
            .benchmarks/

  mutation:
    runs-on: ubuntu-latest
    name: Mutation Testing
    timeout-minutes: 30  # Reduced timeout with optimizations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make mutate || true  # Continue on failure
      - uses: actions/upload-artifact@v4
        if: always()  # Upload even if mutation testing fails/times out
        with:
          name: mutation-report
          path: htmlcov/mutmut.html

  coverage:
    runs-on: ubuntu-latest
    name: Coverage Report
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make cov
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  heavy-lint:
    runs-on: ubuntu-latest
    name: Heavy Lint (flake8/pylint)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - uses: abatilo/actions-poetry@v3
      - run: poetry install --no-interaction
      - run: make lint
