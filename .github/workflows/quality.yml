name: 🧬 Quality Benchmarks & Advanced Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC

jobs:
  # Job 1: Mutation Testing (Fast on PR/Push, Full on Schedule)
  mutation-fast:
    runs-on: ubuntu-latest
    name: 🧬 Mutation Testing (Fast)
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: abatilo/actions-poetry@v2
      - run: poetry install --no-interaction
      - run: poetry run make mutate-fast || true  # Continue on failure, upload results
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: mutation-fast-results
          path: |
            .mutmut-cache/
            .coverage
            htmlcov/

  # Job 2: Full Mutation Testing (Scheduled Weekly)
  mutation-full:
    runs-on: ubuntu-latest
    name: 🧬 Mutation Testing (Full - Weekly)
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: abatilo/actions-poetry@v2
      - run: poetry install --no-interaction
      - run: poetry run make mutate || true  # Continue on failure
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: mutation-full-results
          path: |
            .mutmut-cache/
            .coverage
            htmlcov/

  # Job 3: Performance Benchmarks
  benchmarks:
    runs-on: ubuntu-latest
    name: ⚡ Performance Benchmarks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: abatilo/actions-poetry@v2
      - run: poetry install --no-interaction
      - run: poetry run make perf
      - uses: actions/upload-artifact@v3
        with:
          name: benchmarks
          path: |
            .benchmarks/

  # Job 4: Coverage Report
  coverage:
    runs-on: ubuntu-latest
    name: 📊 Coverage Report
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: abatilo/actions-poetry@v2
      - run: poetry install --no-interaction
      - run: poetry run make cov
      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 5: Heavy Lint (flake8/pylint)
  heavy-lint:
    runs-on: ubuntu-latest
    name: 🔍 Heavy Lint (flake8/pylint)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - uses: abatilo/actions-poetry@v2
      - run: poetry install --no-interaction
      - run: poetry run make lint
