name: 🧪 CI Regression & Enterprise Release

on:
  pull_request:
    branches: [main, "feat/*"]
  push:
    branches: [main, "feat/*", "feature/**", "fix/**"]

jobs:
  # Job 1: Version Extraction
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: ❯ Get version number from pyproject.toml
        id: set-version
        run: |
          VERSION=$(grep "version = " pyproject.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # Job 2: Advanced Production Tollgates (BLOCKING)
  # This enforces the Zero-Trust model before any tests run
  tollgates:
    runs-on: ubuntu-latest
    name: 🛡️ Advanced Production Tollgates
    steps:
      - uses: actions/checkout@v4
      - name: ❯ Set up Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: ❯ Install Poetry 📦
        uses: abatilo/actions-poetry@v2
      - name: ❯ Install dependencies 📚
        run: poetry install --no-interaction
      - name: 🛡️ Run All Enterprise Tollgates (Blocking)
        run: poetry run make tollgates
      - name: ✅ All Tollgates Passed
        run: echo "✓ Zero-Trust Production Tollgates PASSED"

  # Job 3: Quality Gate (Lint, Type, Test, Coverage)
  # Consolidates all quality checks into a single Poetry-based run
  quality-gate:
    needs: [tollgates, version]
    runs-on: ubuntu-latest
    name: 🧬 Quality Gate (95%+ Coverage, Type Safety, Linting)
    steps:
      - uses: actions/checkout@v4
      - name: ❯ Set up Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: ❯ Install Poetry 📦
        uses: abatilo/actions-poetry@v2
      - name: ❯ Install dependencies 📚
        run: poetry install --no-interaction
      - name: 🧪 Run Full Quality Gate (Format, Lint, Type, Test, Cov, Sec)
        run: poetry run make check
      - name: 📊 Upload Coverage Report
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 4: Build & Publish to PyPI (Tagged Releases Only)
  publish:
    needs: quality-gate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: 📦 Build & Publish to PyPI
    permissions:
      contents: write
      id-token: write  # Required for PyPI OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: ❯ Set up Python 🐍
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: ❯ Install Poetry 📦
        uses: abatilo/actions-poetry@v2
      - name: ❯ Build distribution packages 🧰
        run: poetry build
      - name: ❯ Publish to PyPI 🚀
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
