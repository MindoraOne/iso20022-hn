# Corre en cada push a la rama de trabajo y en cada PR hacia main: linta con
# ruff (solo el código propio: capa API + tests + scripts), corre la suite de
# pytest y escanea la imagen Docker con Trivy. Para que esto BLOQUEE el merge
# hace falta activar la protección de rama marcando `test` y `security` como
# checks obligatorios (ver docs/ci-y-seguridad.md).
name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint y tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev.txt
          pip install lxml

      - name: Lint (ruff)
        run: ruff check pain001/api tests scripts

      - name: Tests (pytest)
        run: pytest tests/ -q

  security:
    name: Trivy (imagen Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build de la imagen
        run: docker build -t iso20022-hn:ci .

      - name: Escaneo de vulnerabilidades con Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: iso20022-hn:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
