services:
  pain001-local:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: pain001-local:latest
    container_name: pain001-local
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3